model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
approvals_reviewer = "guardian_subagent"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
[projects."/Users/tfinklea/git/nixos-config"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/chezmoi-config"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/nebularnews"]
trust_level = "trusted"

[projects."/Users/tfinklea"]
trust_level = "trusted"

[projects."/Users/tfinklea/Downloads"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/spotlight-caffeinate"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/nebularnews-ios"]
trust_level = "trusted"

[projects."/Users/tfinklea/codex"]
trust_level = "trusted"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[mcp_servers.excalidraw]
url = "https://mcp.excalidraw.com"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.cloudflare-docs]
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-bindings]
url = "https://bindings.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-builds]
url = "https://builds.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-observability]
url = "https://observability.mcp.cloudflare.com/mcp"

[features]
multi_agent = true
apps = true
guardian_approval = true

[tui]
alternate_screen = "never"

[sandbox_workspace_write]
network_access = true
