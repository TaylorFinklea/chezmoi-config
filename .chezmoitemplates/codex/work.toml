trust_level = "trusted"

[projects."/Users/tfinklea/Downloads"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/spotlight-caffeinate"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/nebularnews-ios"]
trust_level = "trusted"

