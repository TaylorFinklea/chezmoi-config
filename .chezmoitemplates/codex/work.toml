trust_level = "trusted"

[projects."/Users/tfinklea/git/chezmoi-config"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/nebularnews"]
trust_level = "trusted"

[projects."/Users/tfinklea"]
trust_level = "trusted"

[projects."/Users/tfinklea/Downloads"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/spotlight-caffeinate"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/nebularnews-ios"]
trust_level = "trusted"

[projects."/Users/tfinklea/codex"]
trust_level = "trusted"

[projects."/Users/tfinklea/z-temp"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/ai-scorecard"]
trust_level = "trusted"

[projects."/Users/tfinklea/git"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/pos"]
trust_level = "trusted"

[projects."/Users/tfinklea/git/personal-github-runners"]
trust_level = "trusted"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[mcp_servers.excalidraw]
url = "https://mcp.excalidraw.com"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.cloudflare-docs]
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-bindings]
url = "https://bindings.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-builds]
url = "https://builds.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-observability]
url = "https://observability.mcp.cloudflare.com/mcp"

[mcp_servers.atlassian_rovo]
enabled = true
url = "https://mcp.atlassian.com/v1/mcp"

[features]
multi_agent = true
apps = true
guardian_approval = true
js_repl = true

[tui]
alternate_screen = "never"
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "osc9"

[sandbox_workspace_write]
network_access = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true
