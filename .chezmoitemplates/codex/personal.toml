{{- $profile := "personal" -}}
{{- range $server := .mcpServers }}
{{- $enabled := or (eq $server.scope "shared") (and (eq $server.scope "work-only") (eq $profile "work")) (and (eq $server.scope "personal-only") (eq $profile "personal")) -}}
{{- if and $enabled (has "codex" $server.targets) }}
{{- $codex := index $server "codex" }}
[mcp_servers.{{ $server.id }}]
{{- with index $codex "command" }}
command = {{ . | quote }}
{{- end }}
{{- with index $codex "args" }}
args = [{{- range $index, $arg := . }}{{ if gt $index 0 }}, {{ end }}{{ $arg | quote }}{{- end }}]
{{- end }}
{{- with index $codex "url" }}
url = {{ . | quote }}
{{- end }}
{{- with index $codex "enabled" }}
enabled = {{ . }}
{{- end }}
{{- with index $codex "bearer_token_env_var" }}
bearer_token_env_var = {{ . | quote }}
{{- end }}
{{- with index $codex "toolApprovals" }}
{{- range $toolName, $approval := . }}

[mcp_servers.{{ $server.id }}.tools.{{ $toolName }}]
approval_mode = {{ $approval | quote }}
{{- end }}
{{- end }}

{{- end }}
{{- end }}

[features]
multi_agent = true
apps = true
guardian_approval = true

[tui]
alternate_screen = "never"
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "osc9"

[tui.model_availability_nux]
"gpt-5.5" = 2

[sandbox_workspace_write]
network_access = true

[notice]
hide_rate_limit_model_nudge = true

{{- range $plugin := .codexPlugins }}
{{- $enabled := or (eq $plugin.scope "shared") (and (eq $plugin.scope "work-only") (eq $profile "work")) (and (eq $plugin.scope "personal-only") (eq $profile "personal")) -}}
{{- if $enabled }}
[plugins.{{ $plugin.id | quote }}]
enabled = true

{{- end }}
{{- end }}
