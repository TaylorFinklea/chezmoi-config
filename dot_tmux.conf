# Lean, window-first tmux config for AI-heavy terminal workflows.
# Managed by chezmoi as ~/.tmux.conf.

##### Core behavior ###########################################################

# Use a familiar GNU Screen-style prefix and preserve C-a for nested sessions.
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Keep reloads fast while editing this file through chezmoi.
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Strong defaults for terminal tooling without getting clever.
set -g default-terminal "tmux-256color"
set -g default-shell "/opt/homebrew/bin/fish"
set -g default-command "/opt/homebrew/bin/fish -l"
set -as terminal-features ",tmux-256color:RGB,xterm-256color:RGB,screen-256color:RGB,wezterm:RGB,alacritty:RGB,kitty:RGB,xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:extkeys,tmux-256color:extkeys,wezterm:extkeys,alacritty:extkeys,kitty:extkeys,xterm-ghostty:extkeys"
set -s extended-keys on
set -s extended-keys-format csi-u
set -g focus-events on
set -s escape-time 10
set -g history-limit 100000
set -g mouse on
set -g status-position top
set -g renumber-windows on
set -g base-index 1
set -g set-titles on
set -g set-titles-string "#I: #W"
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g automatic-rename off
setw -g allow-rename off

# New windows and splits should start where you already are.
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key '|' split-window -h -c "#{pane_current_path}"

# Prefer a window-centric workflow, but make pane movement and resizing obvious.
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
bind-key -nr M-h previous-window
bind-key -nr M-l next-window
bind-key -nr M-H swap-window -t -1 \; previous-window
bind-key -nr M-L swap-window -t +1 \; next-window
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5
bind-key z resize-pane -Z

# Richer built-ins for discovery and navigation.
bind-key w choose-tree -Zw
bind-key s choose-tree -Zs
bind-key P display-popup -w 90% -h 85% -d "#{pane_current_path}"
bind-key A display-popup -w 90% -h 85% -d "#{pane_current_path}" -E "/opt/homebrew/bin/fish -ilc 'tmuxai --model codex'"
bind-key G display-popup -w 90% -h 85% -d "#{pane_current_path}" -E "/opt/homebrew/bin/fish -ilc 'tmuxai --model copilot'"
bind-key / display-popup -w 70% -h 80% -E "less -R ~/.config/tmux/cheatsheet.txt"
bind-key ? display-popup -w 90% -h 85% -E "tmux list-keys | less -R"
bind-key S if-shell '[ -x "$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh" ]' 'run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh" \; display-message "tmux session saved"' 'display-message "Install TPM plugins first"'
bind-key R if-shell '[ -x "$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh" ]' 'run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh" \; display-message "tmux session restored"' 'display-message "Install TPM plugins first"'

##### Copy mode ###############################################################

# A few Neovim-like copy-mode bindings without changing tmux's core behavior.
bind-key '[' copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

##### Theme — Tokyo Night #####################################################

# Hand-tuned Tokyo Night palette so the status line renders correctly even
# before TPM installs plugins.  Colors from folke/tokyonight.nvim (night).
#   bg:      #1a1b26   fg:      #c0caf5   blue:    #7aa2f7
#   purple:  #bb9af7   cyan:    #7dcfff   yellow:  #e0af68
#   orange:  #ff9e64   red:     #f7768e   green:   #9ece6a
#   comment: #565f89   sel:     #3b4261   dark:    #16161e
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "fg=#15161e,bg=#7aa2f7,bold"
set -g message-command-style "fg=#15161e,bg=#e0af68,bold"
set -g mode-style "fg=#15161e,bg=#e0af68,bold"
set -g popup-style "bg=#1a1b26,fg=#c0caf5"
set -g popup-border-style "fg=#7aa2f7"
set -g menu-style "bg=#24283b,fg=#c0caf5"
set -g menu-selected-style "bg=#7aa2f7,fg=#15161e,bold"

# Powerline-style status bar. These separators look best with a Nerd Font or
# another font that includes Powerline glyphs.
set -g status-left-length 80
set -g status-right-length 120
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] TMUX #[fg=#7aa2f7,bg=#24283b,nobold]#[fg=#c0caf5,bg=#24283b] #S "
set -g status-right "#[fg=#565f89,bg=#16161e]#[fg=#c0caf5,bg=#565f89] #{pane_current_command} #[fg=#7dcfff,bg=#565f89]#[fg=#15161e,bg=#7dcfff] %Y-%m-%d %H:%M "
setw -g window-status-format "#[fg=#565f89,bg=#16161e] #I #[fg=#a9b1d6,bg=#16161e]#W "
setw -g window-status-current-format "#[fg=#15161e,bg=#bb9af7,bold] #I #[fg=#15161e,bg=#bb9af7,bold]#W "

# Per-window bell style. tmux composes this around the rendered window slot
# — visible whenever the format string itself doesn't override `bg` (i.e. in
# Moshi mode's plain `#I:#W` format). Pops in orange when a window emits `\a`.
#
# `monitor-activity` is intentionally NOT enabled — it fires on every byte of
# new output from a non-current window, which produces a constant blue
# background on busy windows AND Ghostty plays the system bell on the tmux
# activity alert. The running-process indicator (`●` after the window name)
# already conveys "this window is doing something" without that noise.
setw -g window-status-bell-style "fg=#15161e,bg=#ff9e64,bold"
setw -g monitor-bell on
# Faint vertical bar between slots in `comment` color so window boundaries
# read at a glance without competing with the slot styles. Visible in both
# Moshi (plain format) and local (inline-styled format) modes.
setw -g window-status-separator "#[fg=#3b4261,bg=#16161e]│#[default]"

##### Plugins ################################################################

# Discovery menu: prefix + Space after the plugin is installed.
set -g @tmux-which-key-xdg-enable 1

# Stable session persistence tuned for long-running terminal workflows.
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"

# Save/restore pane layouts and commands, but avoid capturing pane contents by
# default because that can be noisy and may preserve sensitive scrollback.
set -g @resurrect-capture-pane-contents "off"

# TPM plugin list.
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "alexwforsythe/tmux-which-key"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

# Load TPM if it exists. This keeps the config usable before plugins are bootstrapped.
if-shell '[ -d "$HOME/.tmux/plugins/tpm" ]' 'run-shell "$HOME/.tmux/plugins/tpm/tpm"'

##### Moshi (iOS remote-coding client) #######################################

# Propagate MOSHI_CLIENT into session environment when a Moshi-launched client
# attaches. Toggle: app Settings -> Integrations -> Export ENV.
set-option -ga update-environment " MOSHI_CLIENT"

# Stash the local-mode status formats so the Moshi hook can restore them after
# the last Moshi client detaches. Mirrors the Tokyo Night block above.
set -g @local_status_left  "#[fg=#15161e,bg=#7aa2f7,bold] TMUX #[fg=#7aa2f7,bg=#24283b,nobold]#[fg=#c0caf5,bg=#24283b] #S "
set -g @local_status_right "#[fg=#565f89,bg=#16161e]#[fg=#c0caf5,bg=#565f89] #{pane_current_command} #[fg=#7dcfff,bg=#565f89]#[fg=#15161e,bg=#7dcfff] %Y-%m-%d %H:%M "
set -g @local_window_status_format         "#[fg=#565f89,bg=#16161e] #I #[fg=#a9b1d6,bg=#16161e]#W "
set -g @local_window_status_current_format "#[fg=#15161e,bg=#bb9af7,bold] #I #[fg=#15161e,bg=#bb9af7,bold]#W "

# Re-evaluate Moshi mode whenever a client attaches or detaches. The helper
# script blanks status-left/right when any session env has MOSHI_CLIENT, and
# restores @local_status_left/right when the last Moshi client is gone. The
# old config-load-time if-shell only saw the server env and missed the common
# case of attaching via Moshi to a tmux server that was started locally.
set-hook -g client-attached "run-shell '~/.config/tmux/moshi-status.sh apply'"
set-hook -g client-detached "run-shell '~/.config/tmux/moshi-status.sh apply'"

# Manual override if auto-detection misses (e.g. attaching from a transport
# that doesn't propagate MOSHI_CLIENT). Toggles between blanked and local mode.
bind-key M run-shell '~/.config/tmux/moshi-status.sh toggle'
